  <!-- Botón WhatsApp -->

      <svg viewBox="0 0 32 32" width="28" height="28" fill="white">
        <path d="M16 .5C7.5.5.5 7.3.5 15.7c0 2.8.8 5.5 2.2 7.8L.5 31.5l8.2-2.1c2.2 1.2 4.7 1.8 7.3 1.8 8.5 0 15.5-6.8 15.5-15.2S24.5.5 16 .5zm0 27.6c-2.3 0-4.6-.6-6.6-1.7l-.5-.3-4.9 1.3 1.3-4.7-.3-.5c-1.3-2-2-4.3-2-6.7 0-7 5.9-12.7 13.2-12.7s13.2 5.7 13.2 12.7S23.3 28.1 16 28.1zm7.3-9.7c-.4-.2-2.2-1.1-2.6-1.2-.3-.1-.6-.2-.8.2s-.9 1.2-1.1 1.5c-.2.2-.4.3-.8.1-2.3-1.1-3.8-2-5.3-4.5-.4-.6.4-.6 1.1-2 .1-.2.1-.4 0-.6-.1-.2-.8-1.9-1.1-2.6-.3-.7-.6-.6-.8-.6h-.7c-.2 0-.6.1-.9.4s-1.2 1.2-1.2 2.9 1.3 3.4 1.5 3.6c.2.2 2.6 4 6.3 5.6.9.4 1.6.6 2.1.8.9.3 1.7.3 2.4.2.7-.1 2.2-.9 2.5-1.7.3-.8.3-1.5.2-1.7-.1-.2-.3-.3-.7-.5z"/>
      </svg>
    </a>
  </div>

  <!-- Robot -->
  <div class="robot-bot" (click)="openAssistant()">
    <ng-lottie [options]="options"></ng-lottie>
  </div>

</div>

<!-- Ventana de chat (fuera del floating-container) -->
<div class="chat-box" *ngIf="chatAbierto">
  <div class="chat-header">
    <span>Asistente Virtual</span>
    <button (click)="openAssistant()">✕</button>
  </div>

  <div class="chat-messages">
    <div *ngFor="let msg of mensajes" [class]="'mensaje ' + msg.rol">
      {{ msg.texto }}
    </div>
    <div *ngIf="cargando" class="mensaje asistente">Escribiendo...</div>
  </div>

  <div class="chat-input">
    <input
      [(ngModel)]="mensajeUsuario"
      (keyup.enter)="enviar()"
      placeholder="Escribe tu pregunta..."
    />
    <button (click)="enviar()">Enviar</button>
  </div>
</div>
